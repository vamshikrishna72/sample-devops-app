name: CI Pipeline
on:
  push:
      branches:
            - main

            jobs:
              build:
                  runs-on: ubuntu-latest

                      steps:
                            - name: Checkout code
                                    uses: actions/checkout@v3

                                          - name: Set up Python
                                                  uses: actions/setup-python@v5
                                                          with:
                                                                    python-version: '3.10'

                                                                          - name: Run app
                                                                                  run: python app.py

                                                                                    docker:
                                                                                        runs-on: ubuntu-latest
                                                                                            needs: build

                                                                                                steps:
                                                                                                      - name: Checkout code
                                                                                                              uses: actions/checkout@v3
                                                                                                              
                                                                                                                    - name: Build Docker image
                                                                                                                            run: docker build -t sample-app .
                                                                                                                            
                                                                                                                                  - name: Run Docker container
                                                                                                                                          run: docker run sample-app
